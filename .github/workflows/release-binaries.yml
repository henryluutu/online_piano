name: Release Android APK and Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npm run build:web

      - name: Sync Capacitor Android
        run: npm run android:sync

      - name: Build debug APK
        shell: bash
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew
          cd android
          ./gradlew --version
          ./gradlew assembleDebug

      - name: Prepare APK asset
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/online-piano-android-debug.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/online-piano-android-debug.apk

  windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows bundles
        run: npm run windows:build

      - name: Prepare EXE asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exe) {
            throw "No EXE file found in src-tauri/target/release/bundle"
          }

          Copy-Item $exe.FullName "dist/online-piano-windows-setup.exe" -Force

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/online-piano-windows-setup.exe
